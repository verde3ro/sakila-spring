#Configuracion de puerto
server.port=8080

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Generar tablas desde las entidades y luego destruirlas al final
spring.jpa.hibernate.ddl-auto=create-drop

# Formatear el SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true
# Resaltar (colorear) el SQL en consola
spring.jpa.properties.hibernate.highlight_sql=true
# (Opcional) Mostrar comentarios en el SQL
spring.jpa.properties.hibernate.use_sql_comments=false

# Ejecutar data.sql siempre (para cargar datos)
spring.sql.init.mode=always

# ¡Clave! Posponer la ejecución de los scripts hasta que Hibernate haya creado las tablas
spring.jpa.defer-datasource-initialization=true
