spring.application.name=sakila-spring
spring.datasource.url=jdbc:mysql://localhost:3306/sakila
spring.datasource.username=root
spring.datasource.password=password963852741
spring.jpa.hibernate.ddl-auto=validate
# Mostrar SQL en consola
spring.jpa.show-sql=true
# Formatear el SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true
# Resaltar (colorear) el SQL en consola
spring.jpa.properties.hibernate.highlight_sql=true
# (Opcional) Mostrar comentarios en el SQL
spring.jpa.properties.hibernate.use_sql_comments=false

spring.web.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true

# Deshabilitar recursos estáticos (opcional pero recomendado)
spring.web.resources.add-mappings=false
