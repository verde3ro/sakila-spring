<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Iniciar Sesión</title>
	<!-- PrimeReact CSS desde CDN -->
	<link rel="stylesheet" href="https://unpkg.com/primereact/resources/themes/lara-light-blue/theme.css">
	<link rel="stylesheet" href="https://unpkg.com/primereact/resources/primereact.min.css">
	<link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css">
	<link rel="stylesheet" href="https://unpkg.com/primeflex/primeflex.css">
	<!-- Hoja de estilos personalizada -->
	<link rel="stylesheet" href="/login.css">
	<!-- Script personalizado -->
	<script src="/login.js" defer></script>
</head>
<body>
<div class="login-card">
	<div class="text-center mb-4">
		<i class="pi pi-lock lock-icon"></i>
		<h2>Bienvenido</h2>
		<p>Ingresa tus credenciales</p>
	</div>

	<form action="/login" method="post">
		<div class="field">
			<label for="username">Usuario *</label>
			<input type="text" id="username" name="username" class="p-inputtext p-component" autofocus required>
		</div>
		<div class="field">
			<label for="password">Contraseña *</label>
			<input type="password" id="password" name="password" class="p-inputtext p-component" required>
		</div>
		<button type="submit" class="p-button p-component login-button">Iniciar sesión</button>
	</form>

	<div id="errorMsg" style="display: none;" class="error-message"></div>
	<div id="logoutMsg" style="display: none;" class="logout-message"></div>
</div>
</body>
</html>
