#Configuracion datsource
spring.application.name=sakila-spring
spring.datasource.url=jdbc:mysql://localhost:3306/sakila
spring.datasource.username=root
spring.datasource.password=123456789
spring.jpa.hibernate.ddl-auto=validate
# Mostrar SQL en consola
spring.jpa.show-sql=true
# Formatear el SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true
# Resaltar (colorear) el SQL en consola
spring.jpa.properties.hibernate.highlight_sql=true
# (Opcional) Mostrar comentarios en el SQL
spring.jpa.properties.hibernate.use_sql_comments=false

#Configuracion HikariCP Principal
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=540000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.auto-commit=true

#Configuracion dvtools
spring.devtools.restart.log-condition-evaluation-delta=false

# Desactiva la página de error por defecto (Whitelabel Error Page) de Spring Boot
server.error.whitelabel.enabled=false

# Deshabilitar recursos estáticos (opcional pero recomendado)
spring.web.resources.add-mappings=false

#Configuracion logging
logging.level.org.hibernate=INFO
logging.level.mx.edu.upq=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation=TRACE

# Configuracion Open API para desarrollo
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.writer-with-default-pretty-printer=true
springdoc.swagger-ui.enabled=true

# Configuracion de JWT para desarrollo
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080


