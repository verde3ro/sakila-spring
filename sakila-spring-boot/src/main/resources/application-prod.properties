spring.application.name=sakila-spring
spring.datasource.url=jdbc:mysql://localhost:3306/sakila
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
# Mostrar SQL en consola
spring.jpa.show-sql=false
# Formatear el SQL (más legible)
spring.jpa.properties.hibernate.format_sql=true
# Resaltar (colorear) el SQL en consola
spring.jpa.properties.hibernate.highlight_sql=true
# (Opcional) Mostrar comentarios en el SQL
spring.jpa.properties.hibernate.use_sql_comments=false

server.error.whitelabel.enabled=false

# Deshabilitar recursos estáticos (opcional pero recomendado)
spring.web.resources.add-mappings=false

# Logging especifico para producción (solo WARN/ERROR)
logging.level.mx.edu.upq=WARN
logging.level.org.springframework=WARN
logging.file.name=/var/log/sakila-spring-boot/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %level - %msg%n

# Configuracion Open API
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
